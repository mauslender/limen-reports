*{margin:0;padding:0;box-sizing:border-box;}

.row{display:grid;gap:12px;margin-bottom:12px;}
.r1{grid-template-columns:1fr;}.r3{grid-template-columns:1fr 1fr 1fr;}.rR{grid-template-columns:440px 1fr;}.r2{grid-template-columns:1fr 1fr;}.rP{grid-template-columns:1fr 180px 1fr;}.rCT{grid-template-columns:1fr 200px;}.rHM{grid-template-columns:240px 1fr;}

.pl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:12px;}

.sc-top{display:flex;flex-direction:column;}
.sc-top::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-color, var(--ac));}
/* header */
.hdr{padding:28px 28px 24px;background:linear-gradient(135deg,#1e293b,#334155);color:#fff;border-radius:var(--r);box-shadow:0 4px 12px rgba(15,23,42,.2);}.hdr .top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;}
.hdr .bdg{display:inline-flex;align-items:center;gap:6px;padding:3px 12px;background:rgba(255,255,255,.1);border-radius:16px;font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.8);margin-bottom:12px;}.hdr .bdg .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pu 2s infinite;}
@keyframes pu{0%,100%{opacity:1;}50%{opacity:.3;}}
.hdr h1{font-size:clamp(26px,3.5vw,38px);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:6px;}
.hdr .meta{font-size:13px;color:rgba(255,255,255,.65);line-height:1.8;}.hdr .meta b{color:#fff;font-weight:600;}
.hdr .ptag{padding:4px 14px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:rgba(99,102,241,.8);color:#fff;}

.rng{position:relative;margin:0 auto;}.rng svg{width:100%;height:100%;transform:rotate(-90deg);}.rng .bg{fill:none;stroke:var(--cd2);stroke-width:10;}.rng .fg{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1);}.rng .ct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}.rng .ct .n{font-family:var(--m);font-weight:600;line-height:1;}.rng .ct .s{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-top:2px;}
.pill{display:inline-flex;padding:3px 12px;border-radius:4px;font-size:10px;font-weight:700;}
/* sw */
.sw{display:block;}.sw h4{font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:8px;}
.swi{padding:8px 10px;background:var(--bg);border-radius:6px;margin-bottom:5px;font-size:11.5px;}
.swi .top{display:flex;justify-content:space-between;}.swi .c{color:var(--tx2);font-weight:500;}.swi .hi{color:var(--ac);font-family:var(--m);font-weight:600;font-size:11px;}.swi .lo{color:var(--lo);font-family:var(--m);font-weight:600;font-size:11px;}
.swi .desc{font-size:10px;color:var(--tx3);margin-top:3px;line-height:1.4;}
/* spark */
.spk{display:flex;align-items:flex-end;gap:2px;height:32px;margin:8px 0;}.spk .b{flex:1;border-radius:2px 2px 0 0;min-width:2px;}

.tbl{width:100%;border-collapse:collapse;font-size:12px;}.tbl th{text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);font-weight:700;padding:8px;border-bottom:2px solid var(--cd2);}.tbl td{padding:8px;border-bottom:1px solid var(--cd2);color:var(--tx2);}.tbl td.num{font-family:var(--m);font-weight:500;color:var(--tx);}.tbl .move{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--warn);margin-right:4px;vertical-align:middle;}
.tbl .rg{color:#059669;font-weight:600;}.tbl .rn{color:var(--tx);}.tbl .rw{color:#f59e0b;font-weight:600;}.tbl .rl{color:#dc2626;font-weight:600;}

.cmp-row{display:grid;grid-template-columns:100px 1fr 40px 6px 40px 1fr;align-items:center;gap:4px;margin-bottom:5px;font-size:11px;}
.cmp-row .lbl{text-align:right;color:var(--tx2);font-weight:500;}.cmp-row .v1,.cmp-row .v2{font-family:var(--m);font-weight:600;font-size:11px;}

.cmp-row .b2{height:6px;background:var(--cd2);border-radius:3px;overflow:hidden;}.cmp-row .b2 .f{height:100%;border-radius:3px;background:#a5b4fc;}
.cmp-row .sep{text-align:center;color:var(--bd);font-size:8px;}

.tr{display:grid;grid-template-columns:28px 1fr 70px 44px;align-items:center;gap:8px;padding:7px 10px;background:var(--bg);border-radius:6px;margin-bottom:5px;}.tr .rk{font-family:var(--m);font-size:11px;color:var(--tx3);text-align:center;}.tr .tn{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.tr .tb{height:5px;background:var(--cd2);border-radius:3px;overflow:hidden;}.tr .tf{height:100%;border-radius:3px;}.tr .ts{font-family:var(--m);font-size:12px;font-weight:600;text-align:right;}

.perf-filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.perf-filter{width:100%;}
.perf-filter:last-child{grid-column:1/-1;}
.perf-row{grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;padding:6px 8px;font-size:12px;}
.perf-row > *:nth-child(1),.perf-row > *:nth-child(2){display:none;}
.perf-row.hd{font-size:10px;}
.perf-row > *{text-align:center !important;}
.perf-total{display:none;}
#l5B{overflow-x:auto;}
.tbl{font-size:11px;}
.cmp-row{grid-template-columns:70px 1fr 30px 4px 30px 1fr;font-size:10px;}

.lbl{font-size:11px;letter-spacing:.08em;}
.scex{font-size:11px;}
canvas{max-height:280px;}
}

!function(){
var hm=(D.heatmap_points&&D.heatmap_points.length)?D.heatmap_points:null;

function hmRgb(t){ // t 0..1 (SofaScore-like: yellow→orange→red)
  t=Math.max(0,Math.min(1,t));
  var r,g,b;
  if(t<0.5){
    // low: yellow-greenish → yellow/orange
    var u=t/0.5; r=Math.round(230+(255-230)*u); g=Math.round(245+(200-245)*u); b=Math.round(90+(40-90)*u);
  }else{
    // high: orange → dark red
    var u=(t-0.5)/0.5; r=Math.round(255+(204-255)*u); g=Math.round(200+(0-200)*u); b=Math.round(40+(0-40)*u);
  }
  return [r,g,b];
}

function p95(arr){
  if(!arr.length) return 1;
  var s=arr.slice().sort(function(a,b){return a-b;});
  var idx=Math.floor(0.95*(s.length-1));
  return s[idx]||1;
}

function drawPitch(ctx,w,h){
  // SofaScore style pitch: solid green background (lines drawn after heat)
  var pad=14;
  var x0=pad,y0=pad,x1=w-pad,y1=h-pad,pw=x1-x0,ph=y1-y0;
  ctx.clearRect(0,0,w,h);
  // 1) full canvas green (avoid white showing through)
  ctx.fillStyle='#b0d9a8';
  ctx.fillRect(0,0,w,h);
  // rounded container on top
  ctx.fillStyle='#b0d9a8';
  roundRect(ctx,6,6,w-12,h-12,18); ctx.fill();
  ctx.fillStyle='#c0e4b8';
  roundRect(ctx,x0,y0,pw,ph,12); ctx.fill();
}

function drawPitchLines(ctx,w,h){
  var pad=14;
  var x0=pad,y0=pad,x1=w-pad,y1=h-pad,pw=x1-x0,ph=y1-y0;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.65)';
  ctx.lineWidth=1.5;
  // outer
  ctx.strokeRect(x0,y0,pw,ph);
  // center line (horizontal)
  ctx.beginPath(); ctx.moveTo(x0,y0+ph/2); ctx.lineTo(x1,y0+ph/2); ctx.stroke();
  // center circle + spot
  ctx.beginPath(); ctx.arc(x0+pw/2,y0+ph/2,22,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.65)';
  ctx.beginPath(); ctx.arc(x0+pw/2,y0+ph/2,1.7,0,Math.PI*2); ctx.fill();
  // penalty boxes (top = opponent goal, bottom = own goal)
  var boxW=100, boxH=42;
  // top box (opponent)
  ctx.strokeRect(x0+pw/2-boxW/2, y0, boxW, boxH);
  var sW=60, sH=18;
  ctx.strokeRect(x0+pw/2-sW/2, y0, sW, sH);
  ctx.beginPath(); ctx.arc(x0+pw/2, y0+boxH-2, 1.7, 0, Math.PI*2); ctx.fill();
  // arc top
  ctx.beginPath();
  ctx.arc(x0+pw/2, y0+boxH, 14, 0, Math.PI); ctx.stroke();
  // bottom box (own goal)
  ctx.strokeRect(x0+pw/2-boxW/2, y1-boxH, boxW, boxH);
  ctx.strokeRect(x0+pw/2-sW/2, y1-sH, sW, sH);
  ctx.beginPath(); ctx.arc(x0+pw/2, y1-boxH+2, 1.7, 0, Math.PI*2); ctx.fill();
  // arc bottom
  ctx.beginPath();
  ctx.arc(x0+pw/2, y1-boxH, 14, Math.PI, Math.PI*2); ctx.stroke();
  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){
  var rr=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+rr,y);
  ctx.arcTo(x+w,y,x+w,y+h,rr);
  ctx.arcTo(x+w,y+h,x,y+h,rr);
  ctx.arcTo(x,y+h,x,y,rr);
  ctx.arcTo(x,y,x+w,y,rr);
  ctx.closePath();
}

function renderHeatmap(points){
  var W=220,H=340;
  var W2=440,H2=680; // 2x internal canvas — heat renders at double res, scaled via drawImage
  var html='<div style=\"display:flex;align-items:center;justify-content:center;padding:8px 0;\">'
          +'<canvas id=\"hmCv\" width=\"'+W+'\" height=\"'+H+'\" style=\"width:100%;max-width:220px;height:auto;display:block;\"></canvas>'
          +'</div>';
  setTimeout(function(){
    var cv=document.getElementById('hmCv'); if(!cv) return;
    var ctx=cv.getContext('2d'); if(!ctx) return;
    // Draw pitch at 1x on visible canvas (drawPitch/drawPitchLines not modified)
    drawPitch(ctx,W,H);

    // robust scaling: use p95 to avoid outliers
    var counts=[];
    for(var i=0;i<points.length;i++){var c=points[i]&&points[i].count||0; if(c>0) counts.push(c);}
    var scale=p95(counts); if(scale<=0) scale=1;

    // Build alpha-field at 2x (points computed in 1x pitch space then ×2)
    var tmp=document.createElement('canvas');
    tmp.width=W2; tmp.height=H2;
    var tctx=tmp.getContext('2d'); if(!tctx) return;
    tctx.clearRect(0,0,W2,H2);
    tctx.globalCompositeOperation='source-over';
    tctx.filter='none';

    var pad=14;
    var x0=pad,y0=pad,x1=W-pad,y1=H-pad,pw=x1-x0,ph=y1-y0;
    for(var i=0;i<points.length;i++){
      var pt=points[i]||{};
      var x=pt.x, y=pt.y, c=pt.count||0;
      if(x==null||y==null||c<=0) continue;
      var t=Math.min(1, c/scale);
      t=Math.pow(t, 1.1);
      if(t<0.01) continue;
      // Scale 1x coordinates to 2x canvas
      var cx=(x0 + ((100-y)/100)*pw) * 2;
      var cy=(y0 + ((100-x)/100)*ph) * 2;
      tctx.fillStyle='rgba(255,255,255,'+(0.03+0.33*t).toFixed(3)+')';
      tctx.beginPath();
      tctx.arc(cx,cy,6+14*t,0,Math.PI*2);
      tctx.fill();
    }

    // First blur pass — 12px (scaled 2x)
    var tmp2=document.createElement('canvas');
    tmp2.width=W2; tmp2.height=H2;
    var bctx=tmp2.getContext('2d'); if(!bctx) return;
    bctx.clearRect(0,0,W2,H2);
    bctx.filter='blur(12px)';
    bctx.drawImage(tmp,0,0);
    bctx.filter='none';

    // Map alpha to 7-band color ramp (validated spike S58)
    var img=bctx.getImageData(0,0,W2,H2);
    var data=img.data;
    var out=bctx.createImageData(W2,H2);
    var od=out.data;
    for(var p=0;p<data.length;p+=4){
      var a=data[p+3]/255;
      if(a<=0.01){od[p]=0;od[p+1]=0;od[p+2]=0;od[p+3]=0;continue;}
      var inten=Math.max(0,Math.min(1,a));
      var r=0,g=0,b=0,oa=0;
      if(inten < 0.08){
        oa=0;
      } else if(inten < 0.20){
        var u=(inten-0.08)/0.12; r=255; g=255; b=50; oa=0.20+u*0.18;
      } else if(inten < 0.35){
        var u=(inten-0.20)/0.15; r=255; g=230; b=0; oa=0.38+u*0.12;
      } else if(inten < 0.50){
        var u=(inten-0.35)/0.15; r=255; g=Math.round(230-60*u); b=0; oa=0.50+u*0.08;
      } else if(inten < 0.65){
        var u=(inten-0.50)/0.15; r=255; g=Math.round(170-70*u); b=0; oa=0.58+u*0.07;
      } else if(inten < 0.80){
        var u=(inten-0.65)/0.15; r=Math.round(255-25*u); g=Math.round(100-70*u); b=0; oa=0.65+u*0.08;
      } else {
        var u=(inten-0.80)/0.20; r=Math.round(230-30*u); g=Math.round(30-30*u); b=0; oa=0.73+u*0.07;
      }
      od[p]=r; od[p+1]=g; od[p+2]=b;
      od[p+3]=Math.round(255*Math.min(0.80, Math.max(0.0, oa)));
    }
    var ov=document.createElement('canvas');
    ov.width=W2; ov.height=H2;
    var ovctx=ov.getContext('2d'); if(!ovctx) return;
    ovctx.putImageData(out,0,0);
    // Second blur pass — 6px (scaled 2x)
    var ov2=document.createElement('canvas');
    ov2.width=W2; ov2.height=H2;
    var ov2ctx=ov2.getContext('2d'); if(!ov2ctx) return;
    ov2ctx.clearRect(0,0,W2,H2);
    ov2ctx.filter='blur(6px)';
    ov2ctx.drawImage(ov,0,0);
    ov2ctx.filter='none';
    // Composite 2x heat onto 1x visible canvas via drawImage scaling
    ctx.save();
    ctx.globalCompositeOperation='source-over';
    ctx.drawImage(ov2,0,0,W,H);
    ctx.restore();

    // Pitch lines on top at 1x
    drawPitchLines(ctx,W,H);
  },0);
  return html;
}

target.innerHTML=renderHeatmap(hm);
}();

function renderPerfTable(){
  var sp=D.season_performance;
  if(!sp||!sp.length)return;
  var TOURN_LOGO=D.tournament_logos||{};
  var container=document.getElementById('perfTbl');
  var currentSeason=sp.find(function(s){return s.is_current;})||sp[sp.length-1];
  var currentYear=currentSeason.season;
  var currentTeams=Array.from(new Set((currentSeason.rows||[]).map(function(r){return r.team;})));
  var defaultTeam=currentTeams.length===1?currentTeams[0]:'all';
  var state={season:currentYear,tournament:'all',team:defaultTeam};
  function customSelect(id,opts,current){
    var currentOpt=opts.find(function(o){return o.value===current;})||opts[0];
    var trgLogo=currentOpt.logo?'<img src="'+currentOpt.logo+'" style="width:14px;height:14px;margin-right:6px;vertical-align:middle;" onerror="this.style.display=\'none\'">':'';
    return '<div class="cs" id="'+id+'"><div class="cs-trigger">'+trgLogo+currentOpt.label+' ▾</div><div class="cs-menu" style="display:none;">'
      +opts.map(function(o){var logo=o.logo?'<img src="'+o.logo+'" style="width:14px;height:14px;margin-right:6px;vertical-align:middle;" onerror="this.style.display=\'none\'">':'';return '<div class="cs-opt" data-v="'+o.value+'">'+logo+o.label+'</div>';}).join('')
      +'</div></div>';
  }
  function bindCustomSelect(id,onChange){
    var root=document.getElementById(id);if(!root)return;
    var trigger=root.querySelector('.cs-trigger');var menu=root.querySelector('.cs-menu');
    trigger.onclick=function(ev){ev.stopPropagation();document.querySelectorAll('#perfTbl .cs-menu').forEach(function(m){if(m!==menu)m.style.display='none';});menu.style.display=menu.style.display==='none'?'block':'none';};
    root.querySelectorAll('.cs-opt').forEach(function(opt){opt.onclick=function(ev){ev.stopPropagation();menu.style.display='none';onChange(opt.getAttribute('data-v'));};});
  }
  if(!window.__perfCsCloseBound){
    document.addEventListener('click',function(){document.querySelectorAll('#perfTbl .cs-menu').forEach(function(m){m.style.display='none';});});
    window.__perfCsCloseBound=true;
  }

  function render(){
    var isMobile=window.innerWidth<=900;
    var season=sp.find(function(s){return s.season===state.season;});
    var allRows=season?(season.rows||[]):[];

    var tournSet=Array.from(new Set(allRows.map(function(r){return r.tournament;})));
    var teamSet=Array.from(new Set(allRows.map(function(r){return r.team;})));

    if(isMobile){
      if(state.tournament==='all'&&tournSet.length)state.tournament=tournSet[0];
      if(state.team==='all'&&teamSet.length)state.team=teamSet[0];
    }

    var rows=allRows.filter(function(r){
      if(state.tournament!=='all'&&r.tournament!==state.tournament)return false;
      if(state.team!=='all'&&r.team!==state.team)return false;
      return true;
    });

    var seasonOpts=sp.map(function(s){return {value:String(s.season),label:String(s.season),logo:null};});
    var tournOpts=(isMobile?[]:[{value:'all',label:'Todas',logo:null}]).concat(tournSet.map(function(t){return {value:t,label:t,logo:TOURN_LOGO[t]||null};}));
    var teamLogoMap={};allRows.forEach(function(r){if(r.team&&!teamLogoMap[r.team]&&r.team_img)teamLogoMap[r.team]=r.team_img;});
    var teamOpts=(isMobile?[]:[ {value:'all',label:'Todos',logo:null}]).concat(teamSet.map(function(t){return {value:t,label:t,logo:teamLogoMap[t]||null};}));

    var totalApps=rows.reduce(function(a,r){return a+(r.apps||0);},0);
    var totalGoals=rows.reduce(function(a,r){return a+(r.goals||0);},0);
    var totalAssists=rows.reduce(function(a,r){return a+(r.assists||0);},0);
    var _rSum=0,_rApps=0;rows.forEach(function(r){if(r.rating&&r.rating>0){_rSum+=r.rating*(r.apps||0);_rApps+=(r.apps||0);}});
    var avgRating=_rApps>0?(_rSum/_rApps).toFixed(2):'—';
    var html='<div class="perf-filters">'
      +'<div class="perf-filter"><label>Temporada</label>'+customSelect('fSeason',seasonOpts,String(state.season))+'</div>'
      +'<div class="perf-filter"><label>Competicion</label>'+customSelect('fTourn',tournOpts,state.tournament)+'</div>'
      +'<div class="perf-filter"><label>Equipo</label>'+customSelect('fTeam',teamOpts,state.team)+'</div>'
      +'</div>';
    html+='<div class="perf-rows">';
    html+='<div class="perf-row hd"><div class="tn">Torneo</div><div class="tn">Equipo</div><div class="ts">Apps</div><div class="ts">Rating</div><div class="ts">Goles</div><div class="ts">Asist</div></div>';
    rows.forEach(function(r){
      var ratingVal=(r.rating&&r.rating>0)?r.rating.toFixed(2):'—';
      var tLogo=TOURN_LOGO[r.tournament]?'<img src="'+TOURN_LOGO[r.tournament]+'" style="width:14px;height:14px;vertical-align:middle;margin-right:6px;" onerror="this.style.display=\'none\'">':'';
      var teamLogo=r.team_img?'<img src="'+r.team_img+'" style="width:16px;height:16px;vertical-align:middle;margin-right:6px;" onerror="this.style.display=\'none\'">':'';
      html+='<div class="perf-row"><div class="tn">'+tLogo+r.tournament+'</div><div class="tn">'+teamLogo+r.team+'</div><div class="ts">'+(r.apps||0)+'</div><div class="ts">'+ratingVal+'</div><div class="ts">'+(r.goals||0)+'</div><div class="ts">'+(r.assists||0)+'</div></div>';
    });
    if(!isMobile)html+='<div class="perf-row perf-total"><div class="tn">Total</div><div class="tn"></div><div class="ts">'+totalApps+'</div><div class="ts">'+avgRating+'</div><div class="ts">'+totalGoals+'</div><div class="ts">'+totalAssists+'</div></div>';
    html+='</div>';
    container.innerHTML=html;

    bindCustomSelect('fSeason',function(v){state.season=parseInt(v,10);state.tournament='all';state.team='all';render();});
    bindCustomSelect('fTourn',function(v){state.tournament=v;render();});
    bindCustomSelect('fTeam',function(v){state.team=v;render();});
  }

  render();
}
</script>
</body>
</html>
